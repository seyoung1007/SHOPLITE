<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <!-- 전체 레이아웃 -->
    <div class="wrap">
      <!-- 상단 -->
      <header class="header">
        <div class="inner">
          <!-- 로고 -->
          <a href="#" class="logo">chef's studio</a>
          <!-- 메뉴 -->
          <nav class="nav">
            <ul>
              <li><a href="#">쿠킹 클래스</a></li>
              <li><a href="#">소개</a></li>
              <li><a href="#">로그인</a></li>
              <li><i class="fa-solid fa-magnifying-glass"></i></li>
            </ul>
          </nav>
        </div>
      </header>
      <!-- 타이틀영역 -->
      <section class="title-section">
        <div class="inner">
          <div class="title-text">
            <h2>안녕하세요!👨‍🍳👩‍🍳</h2>
            <p>
              최고의 요리 전문가와 함께 배우는 쿠킹 클래스를 지금 만나보세요.
            </p>
          </div>
          <!-- 필터영역 -->
          <button class="filter-btn">☰ 필터</button>
        </div>
      </section>
      <!-- 클래스 영역 -->
      <section class="class-wrap">
        <div class="inner">
          <!-- 클래스 1 -->
          <ul class="class-list">
            <li class="card">
              <!-- 이미지 -->
              <img src="images/img-1.png" alt="수프" />
              <!-- 클래스 설명 -->
              <div class="info">
                <p class="country">
                  <span>싱가포르</span>
                  <img src="images/flag/Singapore.png" alt="싱가포르" />
                </p>
                <h3>토마토 장식이 돋보이는<br />수프 만들기</h3>
                p.
              </div>
            </li>
          </ul>
          <!-- 클래스 2 -->
        </div>
      </section>
    </div>
  </body>
</html>
